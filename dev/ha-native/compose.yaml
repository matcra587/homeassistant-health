---
name: ha-native-health

services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:2026.5.1
    restart: unless-stopped
    depends_on:
      health-tracker:
        condition: service_healthy
    ports:
      - "8123:8123"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./homeassistant/configuration.yaml:/config/configuration.yaml:ro
      - ./homeassistant/preconfig.sh:/etc/cont-init.d/00-preconfig.sh:ro
      - ./homeassistant/preconfig:/preconfig.d/01-homeassistant-health:ro
      - ../../custom_components:/config/custom_components:ro

  seed-homeassistant:
    image: alpine/curl:8.17.0
    depends_on:
      homeassistant:
        condition: service_started
    volumes:
      - ./homeassistant/onboard.sh:/onboard.sh:ro
    entrypoint: ["/bin/sh", "/onboard.sh"]
    restart: "no"

  health-tracker:
    image: oven/bun:1.3.13-alpine
    restart: unless-stopped
    working_dir: /app
    command: sh -c "bun install --frozen-lockfile && bun run dev"
    environment:
      HEALTH_TRACKER_DB_PATH: /data/health.db
      HEALTH_TRACKER_OPTIONS_PATH: /data/options.json
      HOST: 0.0.0.0
      NODE_ENV: development
      PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - ../../health-tracker:/app
      - health_data:/data
      - health_node_modules:/app/node_modules
      - ./health-tracker/options.json:/data/options.json:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  seed-health:
    image: alpine/curl:8.17.0
    depends_on:
      health-tracker:
        condition: service_healthy
    volumes:
      - ./health-tracker/seed-health.sh:/seed-health.sh:ro
    entrypoint: ["/bin/sh", "/seed-health.sh"]
    restart: "no"

volumes:
  health_data:
  health_node_modules:
