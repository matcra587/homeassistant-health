---
name: Home Assistant Health
version: "0.5.1"
slug: homeassistant_health
description: Family health tracker for Home Assistant
url: https://github.com/matcra587/homeassistant-health/tree/main/health-tracker
image: ghcr.io/matcra587/homeassistant-health
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
ingress: true
ingress_port: 3000
panel_icon: mdi:scale-bathroom
panel_title: Health
homeassistant_api: true
hassio_api: true
hassio_role: default
discovery:
  - homeassistant_health
ports:
  3000/tcp: null
ports_description:
  3000/tcp: Health App and API
watchdog: http://[HOST]:[PORT:3000]/api/health
map:
  - type: addon_config
    read_only: false
options:
  native_integration:
    enabled: true
    token: ""
    metrics:
      - current_weight
      - logged_today
      - streak_days
      - goal_progress
schema:
  native_integration:
    enabled: bool
    token: password?
    metrics:
      - list(current_weight|logged_today|streak_days|goal_progress)
