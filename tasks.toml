#:schema https://mise.en.dev/schema/mise-task.json

[default]
description = "List available tasks"
quiet = true
run = "mise tasks"

[check]
description = "Run local verification checks"
depends = ["lint", "test", "build", "rumdl", "dockerfile:lint", "shell:lint"]

[ci]
description = "Run CI-equivalent checks"
depends = ["check", "workflow:lint", "workflow:security"]

[fix]
description = "Apply automatic formatting and lint fixes"
depends = ["fmt", "lint:fix", "rumdl:fix"]

[deps]
description = "Install app dependencies"
run = '''
if [ -f "${APP_DIR}/package.json" ]; then
  cd "${APP_DIR}" && bun install --frozen-lockfile
else
  echo "skipping deps: ${APP_DIR}/package.json not found"
fi
'''

[dev]
description = "Start the app dev server"
alias = "d"
raw_args = true
run = '''
if [ -f "${APP_DIR}/package.json" ]; then
  cd "${APP_DIR}" && bun run dev "$@"
else
  echo "cannot start dev server: ${APP_DIR}/package.json not found" >&2
  exit 1
fi
'''

[build]
description = "Build production assets/server"
alias = "b"
run = '''
if [ -f "${APP_DIR}/package.json" ]; then
  cd "${APP_DIR}" && bun run build
else
  echo "skipping build: ${APP_DIR}/package.json not found"
fi
'''
sources = [
  "health-tracker/rootfs/app/**/*",
  "health-tracker/config.yaml",
  "health-tracker/build.yaml",
  "health-tracker/Dockerfile",
]

[test]
description = "Run Bun tests"
alias = "t"
raw_args = true
run = '''
if [ -f "${APP_DIR}/package.json" ]; then
  cd "${APP_DIR}" && bun run test "$@"
else
  echo "skipping test: ${APP_DIR}/package.json not found"
fi
'''

[lint]
description = "Run Biome checks"
raw_args = true
run = '''
if [ -f "${APP_DIR}/package.json" ]; then
  cd "${APP_DIR}" && bun run lint "$@"
else
  echo "skipping lint: ${APP_DIR}/package.json not found"
fi
'''

["lint:fix"]
description = "Run Biome with automatic fixes"
raw_args = true
run = '''
if [ -f "${APP_DIR}/package.json" ]; then
  cd "${APP_DIR}" && bun run check "$@"
else
  echo "skipping lint:fix: ${APP_DIR}/package.json not found"
fi
'''

[fmt]
description = "Format app files"
raw_args = true
run = '''
if [ -f "${APP_DIR}/package.json" ]; then
  cd "${APP_DIR}" && bun run format "$@"
else
  echo "skipping fmt: ${APP_DIR}/package.json not found"
fi
'''

[rumdl]
description = "Lint Markdown files with rumdl"
run = "rumdl check ."

["rumdl:fix"]
description = "Fix Markdown files with rumdl"
raw_args = true
run = "rumdl fix"

["dockerfile:lint"]
description = "Lint Dockerfiles with hadolint"
run = "files=$(find . -path ./.git -prune -o -path ./node_modules -prune -o -name Dockerfile -type f -print); if [ -n \"$files\" ]; then hadolint $files; else echo 'skipping Dockerfile lint: no Dockerfiles found'; fi"

["shell:lint"]
description = "Lint shell scripts with shellcheck"
run = "files=$(find . -path ./.git -prune -o -path ./node_modules -prune -o -path ./.rumdl_cache -prune -o \\( -name '*.sh' -o -path './health-tracker/rootfs/etc/services.d/*/run' -o -path './health-tracker/rootfs/etc/services.d/*/finish' \\) -type f -print); if [ -n \"$files\" ]; then shellcheck -x $files; else echo 'skipping shell lint: no shell scripts found'; fi"

["workflow:lint"]
description = "Lint GitHub Actions workflows"
run = "if [ -d .github/workflows ]; then actionlint -color; else echo 'skipping workflow lint: .github/workflows not found'; fi"

["workflow:security"]
description = "Scan GitHub Actions workflows with zizmor"
run = "if [ -d .github/workflows ]; then zizmor ./.github/ --persona pedantic --offline --no-progress --color never; else echo 'skipping workflow security scan: .github/workflows not found'; fi"

[pre-commit]
description = "Run hk pre-commit hook"
run = "hk run pre-commit"
