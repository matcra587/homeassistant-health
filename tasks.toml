#:schema https://mise.en.dev/schema/mise-task.json

[default]
description = "List available tasks"
quiet = true
run = "mise tasks"

[check]
description = "Run local verification checks"
depends = ["typecheck", "typecheck:py", "test", "build", "lint"]

[ci]
description = "Run CI-equivalent checks"
depends = ["check", "lint:workflow:security"]

[fix]
description = "Apply automatic formatting and lint fixes"
depends = ["fmt", "fix:py", "lint:ts:fix", "lint:md:fix"]

[deps]
description = "Install project dependencies"
depends = ["deps:ts", "deps:py"]

["deps:ts"]
description = "Install app dependencies"
run = '''
if [ -f "${APP_DIR}/package.json" ]; then
  cd "${APP_DIR}" && bun install --frozen-lockfile
else
  echo "skipping deps: ${APP_DIR}/package.json not found"
fi
'''

["deps:py"]
description = "Sync Home Assistant integration Python dependencies"
env = { UV_LINK_MODE = "copy" }
run = "uv sync --directory \"${CUSTOM_COMPONENTS_DIR}\" --frozen"

[dev]
description = "Start the app dev server"
alias = "d"
raw_args = true
run = '''
if [ -f "${APP_DIR}/package.json" ]; then
  cd "${APP_DIR}" && bun run dev "$@"
else
  echo "cannot start dev server: ${APP_DIR}/package.json not found" >&2
  exit 1
fi
'''

["dev:ha-native"]
description = "Start a local Home Assistant stack for the native integration"
run = "docker compose -f dev/ha-native/compose.yaml up --build"

["dev:ha-native:down"]
description = "Stop the local Home Assistant native integration stack"
run = "docker compose -f dev/ha-native/compose.yaml down -v"

[build]
description = "Build production assets/server"
alias = "b"
run = '''
if [ -f "${APP_DIR}/package.json" ]; then
  cd "${APP_DIR}" && bun run build
else
  echo "skipping build: ${APP_DIR}/package.json not found"
fi
'''
sources = [
  "health-tracker/src/**/*",
  "health-tracker/tests/**/*",
  "health-tracker/package.json",
  "health-tracker/bun.lock",
  "health-tracker/tsconfig.json",
  "health-tracker/config.yaml",
  "health-tracker/Dockerfile",
]

[bump]
description = "Bump app and integration versions"
raw_args = true
file = ".mise/tasks/bump"

[typecheck]
description = "Run TypeScript type checks"
run = '''
if [ -f "${APP_DIR}/package.json" ]; then
  cd "${APP_DIR}" && bun run typecheck
else
  echo "skipping typecheck: ${APP_DIR}/package.json not found"
fi
'''

["typecheck:py"]
description = "Run ty checks for the Home Assistant integration"
env = { UV_LINK_MODE = "copy" }
run = "uv run --directory \"${CUSTOM_COMPONENTS_DIR}\" --frozen ty check homeassistant_health"

[test]
description = "Run all tests"
alias = "t"
depends = ["test:ts"]

["test:ts"]
description = "Run Bun tests"
raw_args = true
run = '''
if [ -f "${APP_DIR}/package.json" ]; then
  cd "${APP_DIR}" && bun run test "$@"
else
  echo "skipping test: ${APP_DIR}/package.json not found"
fi
'''

[lint]
description = "Run all lint checks"
depends = ["lint:ts", "lint:py", "lint:md", "lint:docker", "lint:shell", "lint:workflow"]

["lint:ts"]
description = "Run Biome checks"
raw_args = true
run = '''
if [ -f "${APP_DIR}/package.json" ]; then
  cd "${APP_DIR}" && bun run lint "$@"
else
  echo "skipping lint: ${APP_DIR}/package.json not found"
fi
'''

["lint:ts:fix"]
description = "Run Biome with automatic fixes"
raw_args = true
run = '''
if [ -f "${APP_DIR}/package.json" ]; then
  cd "${APP_DIR}" && bun run lint:fix "$@"
else
  echo "skipping lint:fix: ${APP_DIR}/package.json not found"
fi
'''

["lint:py"]
description = "Run Ruff checks for the Home Assistant integration"
env = { UV_LINK_MODE = "copy" }
run = "uv run --directory \"${CUSTOM_COMPONENTS_DIR}\" --frozen ruff check homeassistant_health"

["lint:py:fix"]
description = "Run Ruff with automatic fixes for the Home Assistant integration"
env = { UV_LINK_MODE = "copy" }
run = "uv run --directory \"${CUSTOM_COMPONENTS_DIR}\" --frozen ruff check --fix homeassistant_health"

["fix:py"]
description = "Apply Python lint fixes and formatting"
env = { UV_LINK_MODE = "copy" }
run = [
  "uv run --directory \"${CUSTOM_COMPONENTS_DIR}\" --frozen ruff check --fix homeassistant_health",
  "uv run --directory \"${CUSTOM_COMPONENTS_DIR}\" --frozen ruff format homeassistant_health",
]

[fmt]
description = "Format app files"
raw_args = true
run = '''
if [ -f "${APP_DIR}/package.json" ]; then
  cd "${APP_DIR}" && bun run format "$@"
else
  echo "skipping fmt: ${APP_DIR}/package.json not found"
fi
'''

["fmt:py"]
description = "Format the Home Assistant integration"
env = { UV_LINK_MODE = "copy" }
run = "uv run --directory \"${CUSTOM_COMPONENTS_DIR}\" --frozen ruff format homeassistant_health"

["lint:md"]
description = "Lint Markdown files with rumdl"
run = "rumdl check ."

["lint:md:fix"]
description = "Fix Markdown files with rumdl"
raw_args = true
run = "rumdl fix"

["lint:docker"]
description = "Lint Dockerfiles with hadolint"
run = "files=$(find . -path ./.git -prune -o -path '*/node_modules' -prune -o -path '*/dist' -prune -o -name Dockerfile -type f -print); if [ -n \"$files\" ]; then hadolint $files; else echo 'skipping Dockerfile lint: no Dockerfiles found'; fi"

["test:docker"]
description = "Smoke test the built Docker image"
file = ".mise/tasks/docker-test"

["lint:shell"]
description = "Lint shell scripts with shellcheck"
run = "files=$(find . -path ./.git -prune -o -path '*/node_modules' -prune -o -path '*/dist' -prune -o -path ./.rumdl_cache -prune -o \\( -name '*.sh' -o -path './.mise/tasks/*' -o -path './health-tracker/rootfs/etc/services.d/*/run' -o -path './health-tracker/rootfs/etc/services.d/*/finish' \\) -type f -print); if [ -n \"$files\" ]; then shellcheck -x $files; else echo 'skipping shell lint: no shell scripts found'; fi"

["lint:workflow"]
description = "Lint GitHub Actions workflows"
run = "if [ -d .github/workflows ]; then actionlint -color; else echo 'skipping workflow lint: .github/workflows not found'; fi"

["lint:workflow:security"]
description = "Scan GitHub Actions workflows with zizmor"
run = "if [ -d .github/workflows ]; then zizmor ./.github/ --persona pedantic --offline --no-progress --color never; else echo 'skipping workflow security scan: .github/workflows not found'; fi"

[pre-commit]
description = "Run hk pre-commit hook"
run = "hk run pre-commit"
