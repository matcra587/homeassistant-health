---
version: 2

updates:
  - package-ecosystem: npm
    directory: /health-tracker
    schedule:
      interval: weekly
      day: friday
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    commit-message:
      prefix: deps
    labels:
      - dependencies
      - npm
    groups:
      npm-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: uv
    directory: /custom_components
    schedule:
      interval: weekly
      day: friday
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    commit-message:
      prefix: deps
    labels:
      - dependencies
      - python
      - uv
    groups:
      uv-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /health-tracker
    schedule:
      interval: weekly
      day: friday
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    commit-message:
      prefix: deps
    labels:
      - dependencies
      - docker
    groups:
      docker-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: docker-compose
    directory: /dev/ha-native
    schedule:
      interval: weekly
      day: friday
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    commit-message:
      prefix: deps
    labels:
      - dependencies
      - docker
    groups:
      compose-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: friday
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions
    groups:
      actions-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
